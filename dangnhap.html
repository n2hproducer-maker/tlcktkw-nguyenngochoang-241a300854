<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập / Đăng Ký - Đông Y Đường</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS tích hợp cho Trang Đăng Nhập Đen Huyền Bí */
        :root {
            --primary-color: #7cb342;
            --bg-dark: #0a0a0a;
            --surface-color: #151515;
            --text-main: #e0e0e0;
            --text-muted: #888;
            --glow-effect: 0 0 15px rgba(124, 179, 66, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }

        /* Nút quay về trang chủ */
        .back-home { position: absolute; top: 20px; left: 20px; color: #fff; text-decoration: none; font-size: 1rem; display: flex; align-items: center; gap: 8px; z-index: 10; transition: 0.3s; background: rgba(0,0,0,0.5); padding: 10px 15px; border-radius: 30px;}
        .back-home:hover { color: var(--primary-color); transform: translateX(-5px); }

        /* Container chia đôi màn hình */
        .auth-container { display: flex; width: 1000px; max-width: 90%; height: 600px; background: var(--surface-color); border-radius: 20px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.8); border: 1px solid #333; position: relative;}

        /* Bên trái: Hình ảnh banner */
        .auth-banner { flex: 1; background: linear-gradient(rgba(10,10,10,0.7), rgba(10,10,10,0.9)), url('https://png.pngtree.com/thumb_back/fh260/back_our/20190620/ourmid/pngtree-chinese-medicine-exhibition-board-winter-disease-summer-treatment-chinese-herbal-medicine-image_162906.jpg') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; border-right: 1px solid #222;}
        .auth-banner h2 { color: var(--primary-color); font-size: 2.5rem; margin-bottom: 15px; text-shadow: 2px 2px 10px #000; }
        .auth-banner p { color: #ccc; font-size: 1.1rem; line-height: 1.6; }

        /* Bên phải: Khu vực Form */
        .auth-form-box { flex: 1; padding: 50px 40px; position: relative; display: flex; flex-direction: column; justify-content: center; background: #0f0f0f;}
        
        /* Logo trong form */
        .form-logo { text-align: center; margin-bottom: 30px; }
        .form-logo img { width: 60px; filter: drop-shadow(0 0 10px rgba(124, 179, 66, 0.5)); margin-bottom: 10px; }
        .form-logo h3 { color: #fff; letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }

        /* Tabs chuyển đổi Đăng nhập / Đăng ký */
        .auth-tabs { display: flex; justify-content: center; margin-bottom: 30px; border-bottom: 2px solid #333; }
        .tab-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); font-size: 1.1rem; font-weight: bold; padding: 10px 0; cursor: pointer; transition: 0.3s; position: relative; }
        .tab-btn.active { color: var(--primary-color); }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 100%; height: 2px; background: var(--primary-color); box-shadow: var(--glow-effect); }

        /* Form Content */
        .form-content { display: none; animation: fadeIn 0.5s ease; }
        .form-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input fields */
        .input-group { position: relative; margin-bottom: 25px; }
        .input-group i { position: absolute; left: 15px; top: 14px; color: #777; transition: 0.3s; }
        .input-group input { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 12px 15px 12px 45px; border-radius: 8px; outline: none; font-size: 1rem; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary-color); box-shadow: 0 0 8px rgba(124, 179, 66, 0.2); }
        .input-group input:focus + i { color: var(--primary-color); }

        /* Nút Submit */
        .btn-submit { width: 100%; background: var(--primary-color); color: #000; border: none; padding: 14px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; }
        .btn-submit:hover { background: #689f38; box-shadow: var(--glow-effect); }

        /* Các liên kết phụ */
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; font-size: 0.9rem; }
        .form-options label { color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .form-options input[type="checkbox"] { accent-color: var(--primary-color); }
        .form-options a { color: var(--primary-color); text-decoration: none; transition: 0.3s; }
        .form-options a:hover { text-decoration: underline; }

        /* Đăng nhập bằng Mạng xã hội */
        .social-login { text-align: center; margin-top: 30px; }
        .social-login p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 15px; position: relative; }
        .social-login p::before, .social-login p::after { content: ''; position: absolute; top: 50%; width: 30%; height: 1px; background: #333; }
        .social-login p::before { left: 0; }
        .social-login p::after { right: 0; }
        
        .social-icons { display: flex; justify-content: center; gap: 15px; }
        .social-btn { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #1a1a1a; color: #fff; text-decoration: none; border: 1px solid #333; transition: 0.3s; font-size: 1.2rem; }
        .social-btn:hover { background: var(--primary-color); color: #000; border-color: var(--primary-color); box-shadow: var(--glow-effect); }

        /* Responsive cho Mobile */
        @media (max-width: 768px) {
            .auth-container { flex-direction: column; height: 90vh; overflow-y: auto; }
            .auth-banner { display: none; /* Ẩn banner trên điện thoại để tiết kiệm diện tích */ }
            .auth-form-box { padding: 30px 20px; justify-content: flex-start; }
            .back-home { top: 10px; left: 10px; }
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Trang Chủ</a>

    <div class="auth-container">
        <div class="auth-banner">
            <h2>Đông Y Đường</h2>
            <p>Hành trình tìm lại sự cân bằng Âm Dương. Đăng nhập để quản lý đơn hàng, tích điểm và nhận những tư vấn sức khỏe độc quyền từ chuyên gia của chúng tôi.</p>
        </div>

        <div class="auth-form-box">
            
            <div class="form-logo">
                <img src="image-Photoroom.png" alt="Logo">
                <h3>Thành Viên</h3>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')">Đăng Nhập</button>
                <button class="tab-btn" onclick="switchTab('register')">Đăng Ký</button>
            </div>

            <form id="loginForm" class="form-content active">
                <div class="input-group">
                    <input type="email" placeholder="Email hoặc Số điện thoại" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Mật khẩu" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="btn-submit">Đăng Nhập <i class="fa-solid fa-right-to-bracket"></i></button>
                
                <div class="form-options">
                    <label><input type="checkbox"> Ghi nhớ đăng nhập</label>
                    <a href="#">Quên mật khẩu?</a>
                </div>

                <div class="social-login">
                    <p>Hoặc đăng nhập bằng</p>
                    <div class="social-icons">
                        <a href="#" class="social-btn"><i class="fa-brands fa-google"></i></a>
                        <a href="#" class="social-btn"><i class="fa-brands fa-facebook-f"></i></a>
                    </div>
                </div>
            </form>

           <form id="registerForm" class="form-content">
    <div class="input-group">
        <input type="text" id="reg-name" placeholder="Họ và Tên" required>
        <i class="fa-solid fa-user"></i>
    </div>
    <div class="input-group">
        <input type="email" placeholder="Email của bạn" required>
        <i class="fa-solid fa-envelope"></i>
    </div>
    <div class="input-group">
        <input type="password" placeholder="Mật khẩu" required>
        <i class="fa-solid fa-lock"></i>
    </div>
    <div class="input-group">
        <input type="password" placeholder="Nhập lại mật khẩu" required>
        <i class="fa-solid fa-shield-halved"></i>
    </div>
    <button type="submit" class="btn-submit">Tạo Tài Khoản <i class="fa-solid fa-user-plus"></i></button>
</form>

        </div>
    </div>

    <script>
        // Hiệu ứng chuyển đổi qua lại giữa Đăng Nhập và Đăng Ký không cần load trang
        function switchTab(tab) {
            // Lấy các elements
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            const tabBtns = document.querySelectorAll('.tab-btn');

            // Xóa active class từ tất cả các nút
            tabBtns.forEach(btn => btn.classList.remove('active'));

            if(tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                tabBtns[0].classList.add('active');
            } else {
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
                tabBtns[1].classList.add('active');
            }
        }
        
        // Ngăn chặn load trang khi submit để xem hiệu ứng
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('.btn-submit');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang xử lý...';
            setTimeout(() => {
                window.location.href = "index.html"; // Chuyển về trang chủ sau khi "đăng nhập thành công"
            }, 1500);
        });

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('.btn-submit');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang tạo...';
            setTimeout(() => {
                alert("Đăng ký thành công! Mời bạn đăng nhập.");
                switchTab('login');
                btn.innerHTML = 'Tạo Tài Khoản <i class="fa-solid fa-user-plus"></i>';
            }, 1500);
        });
    </script>
    <script>
    // Bắt sự kiện khi người dùng bấm nút Đăng Nhập
    document.addEventListener("DOMContentLoaded", function() {
        // Giả sử form đăng nhập của bạn có nút button type="submit"
        const loginForm = document.querySelector(".auth-form-box form") || document.querySelector("form");
        
        if(loginForm) {
            loginForm.addEventListener("submit", function(event) {
                event.preventDefault(); // Ngăn trang web tự động load lại
                
                // Lưu trạng thái "ĐÃ ĐĂNG NHẬP" vào não trình duyệt
                localStorage.setItem("daDangNhap", "true");
                
                alert("Đăng nhập thành công! Đang chuyển hướng...");
                
                // Chuyển người dùng về trang chủ
                window.location.href = "index.html"; 
            });
        }
    });
</script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const registerForm = document.getElementById("registerForm");
        
        if (registerForm) {
            registerForm.addEventListener("submit", function(event) {
                event.preventDefault(); // Phanh gấp! Không cho trang tự tải lại
                
                // Lấy tên từ ô input có id="reg-name"
                const nameInput = document.getElementById("reg-name");
                let fullName = "Khách Hàng"; // Tên mặc định nếu lỗi
                
                if (nameInput && nameInput.value.trim() !== "") {
                    fullName = nameInput.value.trim();
                }
                
                // Lưu vào kho trình duyệt
                localStorage.setItem("tenNguoiDung", fullName);
                localStorage.setItem("daDangNhap", "true");
                
                // HIỆN THÔNG BÁO ĐỂ KIỂM TRA (Nếu thấy bảng này hiện lên là THÀNH CÔNG 100%)
                alert("Đã bắt được tên: " + fullName + " ! Đang chuyển trang...");
                
                // Chuyển sang trang tài khoản
                window.location.href = "taikhoan.html"; 
            });
        }
    });
</script>
</body>
</body>
</html>
